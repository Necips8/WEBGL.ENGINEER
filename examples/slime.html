<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slime Molds</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: black;
    }

    .ui {
      position: absolute;
      top: 20%;
      left: 10%;
      color: white;
      pointer-events: none;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
      max-width: 400px;
      z-index: 100;
    }

    .ui h1 {
      font-size: 3.5rem;
      margin: 0;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .ui p {
      font-size: 1.2rem;
      opacity: 0.8;
      line-height: 1.4;
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="ui">
    <h1>SLIME</h1>
    <p>Physarum-inspired agents exploring virtual environments.</p>
  </div>
  <!-- p5.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <!-- sketch files: load Mold class first -->
  <script>

    class Mold {
      constructor() {
        // Mold variables
        // this.x = random(width);
        // this.y = random(height); 
        this.x = random(width / 2 - 20, width / 2 + 20);
        this.y = random(height / 2 - 20, height / 2 + 20);
        this.r = 0.5;

        this.heading = random(360);
        this.vx = cos(this.heading);
        this.vy = sin(this.heading);
        this.rotAngle = 45;

        // Sensor variables
        this.rSensorPos = createVector(0, 0);
        this.lSensorPos = createVector(0, 0);
        this.fSensorPos = createVector(0, 0);
        this.sensorAngle = 45;
        this.sensorDist = 10;

      }

      update() {
        this.vx = cos(this.heading);
        this.vy = sin(this.heading);

        // Using % Modulo expression to wrap around the canvas
        this.x = (this.x + this.vx + width) % width;
        this.y = (this.y + this.vy + height) % height;

        // Get 3 sensor positions based on current position and heading
        this.getSensorPos(this.rSensorPos, this.heading + this.sensorAngle);
        this.getSensorPos(this.lSensorPos, this.heading - this.sensorAngle);
        this.getSensorPos(this.fSensorPos, this.heading);

        // Get indices of the 3 sensor positions and get the color values from those indices
        let index, l, r, f;
        index = 4 * (d * floor(this.rSensorPos.y)) * (d * width) + 4 * (d * floor(this.rSensorPos.x));
        r = pixels[index];

        index = 4 * (d * floor(this.lSensorPos.y)) * (d * width) + 4 * (d * floor(this.lSensorPos.x));
        l = pixels[index];

        index = 4 * (d * floor(this.fSensorPos.y)) * (d * width) + 4 * (d * floor(this.fSensorPos.x));
        f = pixels[index];

        // Compare values of f, l, and r to determine movement 
        if (f > l && f > r) {
          this.heading += 0;
        } else if (f < l && f < r) {
          if (random(1) < 0.5) {
            this.heading += this.rotAngle;
          } else {
            this.heading -= this.rotAngle;
          }
        } else if (l > r) {
          this.heading += -this.rotAngle;
        } else if (r > l) {
          this.heading += this.rotAngle;
        }


      }

      display() {
        noStroke();
        fill(255);
        ellipse(this.x, this.y, this.r * 2, this.r * 2);

        // line(this.x, this.y, this.x + this.r*3*this.vx, this.y + this.r*3*this.vy);
        // fill(255, 0, 0);
        // ellipse(this.rSensorPos.x, this.rSensorPos.y, this.r*2, this.r*2);
        // ellipse(this.lSensorPos.x, this.lSensorPos.y, this.r*2, this.r*2);
        // ellipse(this.fSensorPos.x, this.fSensorPos.y, this.r*2, this.r*2);

      }

      getSensorPos(sensor, angle) {
        sensor.x = (this.x + this.sensorDist * cos(angle) + width) % width;
        sensor.y = (this.y + this.sensorDist * sin(angle) + height) % height;
      }

    }

    let molds = []; let num = 4000;
    let d;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      angleMode(DEGREES);
      d = pixelDensity();

      for (let i = 0; i < num; i++) {
        molds[i] = new Mold();
      }
      // Description removed to avoid runtime reference errors when running standalone
    }


    function draw() {
      background(0, 5);
      loadPixels();

      for (let i = 0; i < num; i++) {
        molds[i].update();
        molds[i].display();
      }

    }

    // Reset helper
    function resetSimulation(newNum) {
      if (typeof newNum === 'number') num = newNum;
      molds = [];
      for (let i = 0; i < num; i++) molds[i] = new Mold();
      clear();
      background(0);
    }


  </script>

</body>

</html>
